name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "Pulling latest code..."
            git pull origin main
            echo "Installing dependencies..."
            pip install -r requirements.txt
            echo "Restarting service..."
            # 如果使用了 systemd / launchd / pm2 管理进程：
            # sudo systemctl restart auto-garment-web
            # launchctl kickstart -k gui/$(id - u)/auto-garment-web
            # pm2 restart auto-garment-web
            # 如果没有进程管理器，直接 kill 后重启：
            pkill -f "uvicorn app.main:app" || true
            sleep 1
            nohup uvicorn app.main:app --host 0.0.0.0 --port 3000 > uvicorn.log 2>&1 &
            echo "Deployment done."
